
// TURNS OFF BUILD INFO (text bottom left)
r_show_build_info FALSE

// ALIASES --- DONT TOUCH !!!!!!!!!!!! \/

alias +nClip "noclip"
alias -nClip "noclip"

alias +lj "+jump;+!forward;-!duck";
alias -lj "-jump;+!duck";

alias +jb "+jump;+!duck"
alias -jb "-jump"

// BINDS -- YOU CAN CHANGE THESE \/

// BHOP BINDS -- no longer desubticked
	bind mwheeldown "+jump"
	bind mwheelup "+jump"

// JB BIND
	bind mouse5 "+jb"

// LJ BIND
	bind alt "+lj"

// NOCLIP ON HOLD (if you dont want this, remove it or comment it out)
	bind n "+nClip"	

// TOGGLE MINIMAP ZOOM
	bind c  "toggle cl_radar_scale 1 0.3"

// TOGGLEHUD
	bind p "toggle cl_draw_only_deathnotices 0 1"

// NULLS (dont touch these unless theyre broken)
 	bind w "+forward"
    bind a "+a"
	bind s "+s"
    bind d "+d"
exec nulls

